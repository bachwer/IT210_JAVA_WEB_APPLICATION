<div layout:decorate="~{layout/main-layout}" xmlns:layout="http://www.w3.org/1999/xhtml">
    <div layout:fragment="content">

        <h2 th:text="${course.name}"></h2>

        <p th:text="${course.description}"></p>
        <p>Instructor: <span th:text="${course.instructor}"></span></p>
        <p>Duration: <span th:text="${course.duration}"></span> giờ</p>

        <span th:if="${course.full}" style="color:red">
    HẾT CHỖ
</span>

    </div>
</div>
