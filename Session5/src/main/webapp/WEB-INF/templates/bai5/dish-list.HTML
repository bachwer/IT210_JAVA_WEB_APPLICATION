<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title layout:fragment="title">Đặt món nhanh</title>
</head>
<body>
<div layout:fragment="content">
    <h2 th:text="${dish.name}">Tên món (mock)</h2>
    <p>Giá: <span th:text="${dish.price}">Giá (mock)</span> VNĐ</p>
    <p th:text="${dish.isAvailable} ? 'Còn hàng' : 'Hết hàng'"></p>

    <form action="#" th:action="@{/bai5/order/confirm}" method="post">
        <label>Số lượng:</label>
        <input type="number" name="quantity" value="1" min="1"/>
        <button type="submit">Đặt món</button>
    </form>

    <p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></p>
</div>
</body>
</html>
